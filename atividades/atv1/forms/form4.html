<div class="mb-3">
  <label for="nome" class="form-label text-light fs-6">Nome:</label>
  <input
    type="text"
    class="form-control"
    id="nome"
    placeholder="Informe o nome..."
  />
</div>

<div class="row mb-3">
  <div class="col-md-3">
    <label for="cpf" class="form-label text-light fs-6">CPF:</label>
    <input
      type="text"
      class="form-control"
      id="cpf"
      placeholder="Informe o cpf..."
    />
  </div>
  <div class="col-md-7 mt-3 mt-md-0">
    <label for="endereco" class="form-label text-light fs-6">Endereço:</label>
    <input
      type="text"
      class="form-control"
      id="endereco"
      placeholder="Informe o endereço..."
    />
  </div>
  <div class="col-md-2 mt-3 mt-md-0">
    <label for="nivel" class="form-label text-light fs-6">Nível:</label>
    <select class="form-select" id="nivel">
      <option selected>---</option>
      <option value="1">Admin</option>
      <option value="2">Usuário</option>
    </select>
  </div>
</div>

<div class="row mb-4">
  <div class="col-md-5">
    <label for="email" class="form-label text-light fs-6">Email:</label>
    <input
      type="email"
      class="form-control"
      id="email"
      placeholder="Informe o email..."
    />
  </div>
  <div class="col-md-5 mt-3 mt-md-0">
    <label for="senha" class="form-label text-light fs-6">Senha:</label>
    <input
      type="password"
      class="form-control"
      id="senha"
      placeholder="Informe a senha..."
    />
  </div>
  <div class="col-md-2 mt-3 mt-md-0">
    <label for="status" class="form-label text-light fs-6">Status:</label>
    <select class="form-select" id="status">
      <option selected>---</option>
      <option value="1">Ativo</option>
      <option value="0">Inativo</option>
    </select>
  </div>
</div>

<div class="d-flex justify-content-end gap-2 mt-4">
  <button
    type="submit"
    class="btn px-4 py-2"
    style="background-color: #a052ad; color: white; border: none"
  >
    Enviar
  </button>
  <button type="button" class="btn px-4 py-2" style="border: 1px solid #333">
    Cancelar
  </button>
</div>
