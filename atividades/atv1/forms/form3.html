<div class="row g-4 p-5">
  <div class="col-md-6">
    <label class="form-label">Partner Name</label>
    <input type="text" class="form-control border-secondary" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Partner Email ID</label>
    <input type="email" class="form-control border-secondary" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Partner Legal Name</label>
    <input type="text" class="form-control border-secondary" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Partner Mobile</label>
    <input type="text" class="form-control border-secondary" />
  </div>

  <div class="col-12">
    <label class="form-label">Partner Address</label>
    <textarea class="form-control border-secondary" rows="3"></textarea>
  </div>

  <div class="col-md-6">
    <label class="form-label">Contract Start Date</label>
    <input type="date" class="form-control border-secondary" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Contract Expiry Date</label>
    <input type="date" class="form-control border-secondary" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Minimum Loan Amount</label>
    <input type="number" class="form-control border-secondary" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Maximum Loan Amount</label>
    <input type="number" class="form-control border-secondary" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Interest Rate</label>
    <input type="number" step="0.01" class="form-control border-secondary" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Deposit Amount</label>
    <input type="number" class="form-control border-secondary" />
  </div>

  <div lass="col-12 text-center mt-3">
    <button
      type="submit"
      class="btn px-4"
      style="background-color: #e39b67; color: #000"
    >
      Save
    </button>
  </div>
</div>
